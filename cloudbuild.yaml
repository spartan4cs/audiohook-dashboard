# ════════════════════════════════════════════════════════════════
#  Cloud Build configuration — Vertex AI edition
#
#  Authentication: Cloud Run's attached service account uses ADC.
#  No Gemini API key secret needed.
#
#  The Cloud Build service account needs these roles:
#    roles/run.admin
#    roles/iam.serviceAccountUser   (to act-as the Cloud Run SA)
#    roles/artifactregistry.writer
#
#  The Cloud Run service account needs:
#    roles/aiplatform.user          (to call Vertex AI / Gemini)
#
#  Substitution variables (set in Cloud Build trigger):
#    _REGION        GCP region        e.g. us-central1
#    _SERVICE_NAME  Cloud Run service e.g. audiohook-server
#    _REPO          Artifact Registry repo (short name)
#    _RUN_SA        Cloud Run service account email
# ════════════════════════════════════════════════════════════════

substitutions:
  _REGION      : "us-central1"
  _SERVICE_NAME: "audiohook-server"
  _REPO        : "audiohook"
  _RUN_SA      : "audiohook-sa@${PROJECT_ID}.iam.gserviceaccount.com"

steps:
  # ── 1. Build the container image ──────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id  : "build"
    args:
      - build
      - --tag
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
      - --tag
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest"
      - --cache-from
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest"
      - .

  # ── 2. Push image to Artifact Registry ────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id  : "push"
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}"
    waitFor: ["build"]

  # ── 3. Deploy to Cloud Run ─────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id  : "deploy"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      # ── Service account (Vertex AI auth via ADC) ───────────
      - --service-account=${_RUN_SA}
      # ── Instance config ────────────────────────────────────
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --cpu=1
      - --memory=512Mi
      - --timeout=3600
      # ── Secrets (only non-Gemini secrets remain) ───────────
      - --set-secrets=AUDIOHOOK_API_KEY=audiohook-api-key:latest
      # ── Vertex AI env vars (non-sensitive) ─────────────────
      - --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,CRM_ADAPTER=mock,GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}
    waitFor: ["push"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
