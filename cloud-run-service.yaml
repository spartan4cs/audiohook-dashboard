# ════════════════════════════════════════════════════════════════
#  Cloud Run service definition — Vertex AI edition
#
#  Authentication: the Cloud Run service account uses Vertex AI
#  via Application Default Credentials (no API key).
#  Grant the SA:  roles/aiplatform.user
#
#  Apply with:
#    gcloud run services replace cloud-run-service.yaml --region=us-central1
# ════════════════════════════════════════════════════════════════
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: audiohook-server
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      # Service account with roles/aiplatform.user — this IS the Vertex AI credential.
      # Replace with your actual SA email.
      serviceAccountName: audiohook-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
        - image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/audiohook/audiohook-server:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            # ── Runtime config ───────────────────────────────
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: CRM_ADAPTER
              value: mock
            # ── Vertex AI (read by @google/genai SDK) ────────
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              value: YOUR_PROJECT_ID
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            # ── Secrets (only Genesys auth key remains) ──────
            - name: AUDIOHOOK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: audiohook-api-key
                  key: latest
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 5
            periodSeconds: 10
